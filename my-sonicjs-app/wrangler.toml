# ================================================================================
# SonicJS Multi-Environment Configuration
# ================================================================================
# This config supports multiple deployment targets:
#   - Top-level (default) = Preview/CI environment
#   - [env.local] = Local development
#   - [env.staging] = Staging (add when needed)
#   - [env.production] = Production (add when ready)
#
# Usage:
#   wrangler dev --env local              # Local development
#   wrangler deploy                       # Deploy to preview (CI default)
#   wrangler deploy --env staging         # Deploy to staging (when added)
#   wrangler deploy --env production      # Deploy to production (when ready)
#
# See docs/WRANGLER_ENVIRONMENTS_GUIDE.md for full documentation
# ================================================================================

# ================================================================================
# TOP-LEVEL = PREVIEW/CI (Default deployment target)
# ================================================================================
# This is what gets deployed when you run `wrangler deploy` with NO --env flag
# Perfect for PR testing and CI/CD workflows
name = "my-sonicjs-app-preview"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Cloudflare account
account_id = "f61c658f1de7911b0a529f38308adb21"  # Mmcintosh@infowall.com's Account

# D1 Database (CI will sed-replace these IDs with PR-specific values)
[[d1_databases]]
binding = "DB"
database_name = "sonicjs-preview"
database_id = "68223153-215a-4c8f-a9bf-797f11236758"
migrations_dir = "./migrations"

# Workers AI for embeddings (AI Search Plugin)
# Note: AI binding is defined once at top-level and automatically available to all environments
[ai]
binding = "AI"

# Vectorize for vector search (AI Search Plugin)
# Note: Created automatically in CI if it doesn't exist
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "sonicjs-ai-search"
remote = true

# R2 Bucket for media storage
# Note: Created automatically in CI if it doesn't exist
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sonicjs-preview-media"

# Environment variables
[vars]
ENVIRONMENT = "preview"

# Observability
[observability]
enabled = true

# Optional bindings (commented out for preview - add when needed)
# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = "preview-kv-id"

# ================================================================================
# LOCAL DEVELOPMENT ENVIRONMENT
# ================================================================================
[env.local]
name = "my-sonicjs-app-local"
account_id = "f61c658f1de7911b0a529f38308adb21"  # Mmcintosh@infowall.com's Account

[[env.local.d1_databases]]
binding = "DB"
database_name = "sonicjs-local"
database_id = ""  # Empty = auto-provisioning by wrangler
migrations_dir = "./migrations"

[[env.local.vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "sonicjs-ai-search-local"
remote = true  # Vectorize always requires remote=true (no local mode)

[env.local.vars]
ENVIRONMENT = "local"

[env.local.observability]
enabled = true

