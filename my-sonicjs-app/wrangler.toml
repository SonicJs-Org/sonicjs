name = "my-sonicjs-app"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare account
# Note: account_id is set via CLOUDFLARE_ACCOUNT_ID environment variable in CI
# For local dev, set your account_id here or use wrangler login

# Cloudflare Workers settings
workers_dev = true

# D1 Database
# Note: database_name and database_id are automatically updated by GitHub Actions
[[d1_databases]]
binding = "DB"
database_name = "temp-will-be-replaced-by-ci"
database_id = "temp-will-be-replaced-by-ci"
migrations_dir = "./migrations"

# R2 Bucket for media storage
# Note: Commented out for CI - will be created on-demand or skipped
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "sonicjs-pr-media"

# KV Cache
# Note: Commented out for CI - will be created on-demand or skipped
# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = "temp-will-be-replaced-by-ci"

# Workers AI for embeddings (AI Search Plugin)
[ai]
binding = "AI"

# Vectorize for vector search (AI Search Plugin)
# Note: Will be created automatically in CI if not exists
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "sonicjs-ai-search"
remote = true

# Environment variables
[vars]
ENVIRONMENT = "development"

# Observability
[observability]
enabled = true
