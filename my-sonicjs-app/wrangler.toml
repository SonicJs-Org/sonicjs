name = "my-sonicjs-app"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare account
# Note: account_id is set via CLOUDFLARE_ACCOUNT_ID environment variable in CI
# For local dev, set your account_id here or use wrangler login

# Cloudflare Workers settings
workers_dev = true

# D1 Database
# Note: database_name and database_id are automatically updated by GitHub Actions
[[d1_databases]]
binding = "DB"
database_name = "temp-will-be-replaced-by-ci"
database_id = "temp-will-be-replaced-by-ci"
migrations_dir = "./migrations"

# R2 Bucket for media storage (using CI bucket)
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sonicjs-ci-media"

# KV Cache (using CI namespace)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "a16f8246fc294d809c90b0fb2df6d363"

# Workers AI for embeddings (AI Search Plugin)
[ai]
binding = "AI"

# Vectorize for vector search (AI Search Plugin)
# Note: Vectorize doesn't support local dev, must run remote
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "sonicjs-ai-search"
remote = true

# Environment variables
[vars]
ENVIRONMENT = "development"

# Observability
[observability]
enabled = true
